<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>วันดีดี ที่ควรรู้</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow: hidden; }
  html.full, html.full body { overflow: auto; background: #fff; }
  body { font-family: 'Sarabun', sans-serif; background: transparent; color: #222; }

  /* ===== CARD MODE (home page widget) — feed-style overlay ===== */
  .card {
    display: block;
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    margin: 0 0 14px;
    border-radius: 14px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    background: #eee;
    cursor: pointer;
  }
  .card:last-child { margin-bottom: 0; }
  .card-img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }
  .card:hover .card-img { transform: scale(1.03); }
  .card-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0) 35%, rgba(0,0,0,0.55) 65%, rgba(0,0,0,0.9) 100%);
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 16px 18px;
  }
  .card-meta {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 8px; flex-wrap: wrap;
  }
  .badge {
    display: inline-block; font-size: 12px;
    padding: 4px 11px;
    background: rgba(255,255,255,0.22);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #fff;
    border-radius: 999px; font-weight: 700;
    letter-spacing: 0.02em;
  }
  .card-date { font-size: 12px; color: rgba(255,255,255,0.85); }
  .card-title {
    font-size: 22px; font-weight: 800; line-height: 1.3;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    display: -webkit-box; -webkit-line-clamp: 3;
    -webkit-box-orient: vertical; overflow: hidden;
  }

  /* ===== FULL ARTICLE MODE ===== */
  .full-wrap { max-width: 900px; margin: 0 auto; padding: 16px; }
  .full-wrap img {
    display: block;
    max-width: 100%;
    width: auto;
    height: auto;
    border-radius: 12px;
    margin: 0 auto 20px;
  }
  .full-wrap figure { margin: 0 0 20px; text-align: center; }
  .full-wrap figure img { margin-bottom: 8px; }
  .full-wrap figcaption { font-size: 14px; color: #666; }
  .full-wrap p { line-height: 1.7; margin-bottom: 16px; }
  .full-wrap h1, .full-wrap h2, .full-wrap h3 { line-height: 1.3; margin: 24px 0 12px; }
  .back-btn {
    display: inline-block; margin-bottom: 16px;
    color: #666; text-decoration: none; font-size: 14px;
  }

  .loading, .empty { padding: 32px; text-align: center; color: #aaa; }

  @media (max-width: 600px) {
    .card-title { font-size: 18px; }
    .card-overlay { padding: 14px 14px; }
  }
</style>
</head>
<body>
<div id="app"><div class="loading">⏳ กำลังโหลด...</div></div>
<script>
const SUPABASE_URL = 'https://tpoiyykbgsgnrdwzgzvn.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRwb2l5eWtiZ3NnbnJkd3pnenZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NTUwMDIsImV4cCI6MjA5MDIzMTAwMn0.c7Ow_20mpmcDqDdMQ5qnsDV6-RKAO-7-eM1y-EsEXdA';

const params = new URLSearchParams(window.location.search);
const site = params.get('site') || 'jiacpr';
const type = params.get('type');
const isFull = params.get('full') === '1';

const COLORS = { jiacpr:'#1B5E20', health:'#00695C' };
const DEFAULT_LABELS = { health: 'ข่าวสุขภาพ' };

const HEADERS = {
  'apikey': SUPABASE_ANON,
  'Authorization': `Bearer ${SUPABASE_ANON}`,
  'Cache-Control': 'no-cache',
  'Pragma': 'no-cache',
};
const FETCH_OPTS = { headers: HEADERS, cache: 'no-store' };

async function fetchLatestPost(siteSlug) {
  const todayBkk = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Bangkok' });
  const data = await (await fetch(
    `${SUPABASE_URL}/rest/v1/blog_posts?site_slug=eq.${encodeURIComponent(siteSlug)}&order=published_at.desc&limit=50&select=*`,
    FETCH_OPTS
  )).json();
  if (!Array.isArray(data) || data.length === 0) return null;
  const post = data.find(p =>
    Object.values(p).some(v => typeof v === 'string' && v.startsWith(todayBkk))
  ) || data[0];
  return post;
}

function renderCard(post, siteSlug) {
  if (!post) return '';
  const color = COLORS[siteSlug] || '#333';
  const rawDate = Object.values(post).find(v => typeof v === 'string' && /^\d{4}-\d{2}-\d{2}(T|$)/.test(v))
    || post.published_at;
  const dateStr = new Date(rawDate).toLocaleDateString('th-TH', { day:'numeric', month:'long' });
  const category = post.category || DEFAULT_LABELS[siteSlug] || '';
  const fullUrl = `https://goody-bay.vercel.app/?site=${siteSlug}&full=1`;
  return `
    <a class="card" href="${fullUrl}" target="_top">
      ${post.cover_image_url ? `<img class="card-img" src="${post.cover_image_url}" alt="${post.title}">` : ''}
      <div class="card-overlay">
        <div class="card-meta">
          ${category ? `<span class="badge">${category}</span>` : ''}
          <span class="card-date">${dateStr}</span>
        </div>
        <div class="card-title">${post.title}</div>
      </div>
    </a>`;
}

async function load() {
  const app = document.getElementById('app');

  try {
    if (isFull) {
      document.documentElement.classList.add('full');
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/blog_posts?site_slug=eq.${encodeURIComponent(site)}&order=published_at.desc&limit=1&select=*`,
        FETCH_OPTS
      );
      const data = await res.json();
      if (!data || data.length === 0) {
        app.innerHTML = '<div class="empty">ยังไม่มีบทความในวันนี้</div>';
        return;
      }
      const post = data[0];
      document.title = post.title;
      app.innerHTML = `
        <div class="full-wrap">
          <a class="back-btn" href="/?site=${site}" onclick="if(window.history.length>1){event.preventDefault();window.history.back();}">← กลับ</a>
          ${post.cover_image_url ? `<img src="${post.cover_image_url}" alt="${post.title}">` : ''}
          <h1>${post.title}</h1>
          ${post.content_html || ''}
        </div>`;
      return;
    }

    if (type === 'wandee') {
      const post = await fetchLatestPost(site);
      app.innerHTML = post ? renderCard(post, site) : '<div class="empty">ยังไม่มีบทความในวันนี้</div>';
    } else if (type === 'news') {
      const post = await fetchLatestPost('health');
      app.innerHTML = post ? renderCard(post, 'health') : '<div class="empty">ยังไม่มีข่าวในวันนี้</div>';
    } else {
      const [mainPost, healthPost] = await Promise.all([
        fetchLatestPost(site),
        site === 'health' ? Promise.resolve(null) : fetchLatestPost('health'),
      ]);
      if (!mainPost && !healthPost) {
        app.innerHTML = '<div class="empty">ยังไม่มีบทความในวันนี้</div>';
        return;
      }
      app.innerHTML = renderCard(mainPost, site) + renderCard(healthPost, 'health');
    }
  } catch(e) {
    app.innerHTML = `<div class="empty">เกิดข้อผิดพลาด: ${e.message}</div>`;
  }
  postHeight();
  document.querySelectorAll('img').forEach(img => img.addEventListener('load', postHeight));
}

function postHeight() {
  if (window.parent === window) return;
  const h = Math.ceil(document.documentElement.scrollHeight);
  window.parent.postMessage({ source: 'goody', height: h }, '*');
}
window.addEventListener('resize', postHeight);

load();
</script>
</body>
</html>
