<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>วันดีดี ที่ควรรู้</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow: hidden; }
  body { font-family: 'Sarabun', sans-serif; background: #fff; color: #222; padding: 8px 0; }

  /* ===== CARD MODE (home page widget) ===== */
  .card {
    max-width: 900px;
    margin: 0 auto 16px;
    padding: 12px;
    display: flex;
    gap: 20px;
    align-items: center;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
  }
  .card:last-child { margin-bottom: 0; }
  .card-img {
    width: 180px; min-width: 180px; height: 120px;
    object-fit: contain; background: #f5f5f5;
    border-radius: 10px; flex-shrink: 0;
  }
  .card-body { flex: 1; min-width: 0; }
  .badge {
    display: inline-block; font-size: 13px;
    padding: 3px 10px; border-radius: 20px; margin-bottom: 8px;
  }
  .card-title { font-size: 22px; font-weight: 800; line-height: 1.3; margin-bottom: 6px; }
  .card-desc {
    font-size: 15px; color: #666; line-height: 1.5; margin-bottom: 12px;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .read-btn {
    display: inline-block; color: #fff;
    padding: 9px 22px; border-radius: 6px;
    text-decoration: none; font-size: 15px;
  }

  /* ===== FULL ARTICLE MODE ===== */
  .full-wrap { max-width: 900px; margin: 0 auto; padding: 16px; }
  .full-wrap img {
    display: block;
    max-width: 100%;
    width: auto;
    height: auto;
    border-radius: 12px;
    margin: 0 auto 20px;
  }
  .full-wrap figure { margin: 0 0 20px; text-align: center; }
  .full-wrap figure img { margin-bottom: 8px; }
  .full-wrap figcaption { font-size: 14px; color: #666; }
  .full-wrap p { line-height: 1.7; margin-bottom: 16px; }
  .full-wrap h1, .full-wrap h2, .full-wrap h3 { line-height: 1.3; margin: 24px 0 12px; }
  .back-btn {
    display: inline-block; margin-bottom: 16px;
    color: #666; text-decoration: none; font-size: 14px;
  }

  .loading, .empty { padding: 32px; text-align: center; color: #aaa; }

  @media (max-width: 600px) {
    .card { flex-direction: column; }
    .card-img { width: 100%; min-width: 0; height: 180px; }
  }
</style>
</head>
<body>
<div id="app"><div class="loading">⏳ กำลังโหลด...</div></div>
<script>
const SUPABASE_URL = 'https://tpoiyykbgsgnrdwzgzvn.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRwb2l5eWtiZ3NnbnJkd3pnenZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NTUwMDIsImV4cCI6MjA5MDIzMTAwMn0.c7Ow_20mpmcDqDdMQ5qnsDV6-RKAO-7-eM1y-EsEXdA';

const params = new URLSearchParams(window.location.search);
const site = params.get('site') || 'jiacpr';
const isFull = params.get('full') === '1';

const COLORS = { jiacpr:'#1B5E20', jia1669:'#0D47A1', morroo:'#6A1B9A', pharmru:'#004D40', roodee:'#E65100', emr:'#0277BD', health:'#00695C' };
const DEFAULT_LABELS = { health: 'ข่าวสุขภาพ' };

const HEADERS = { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` };

async function fetchLatestPost(siteSlug) {
  const todayBkk = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Bangkok' });
  const data = await (await fetch(
    `${SUPABASE_URL}/rest/v1/blog_posts?site_slug=eq.${encodeURIComponent(siteSlug)}&order=published_at.desc&limit=50&select=*`,
    { headers: HEADERS }
  )).json();
  if (!Array.isArray(data) || data.length === 0) return null;
  const post = data.find(p =>
    Object.values(p).some(v => typeof v === 'string' && v.startsWith(todayBkk))
  ) || data[0];
  return post;
}

function renderCard(post, siteSlug) {
  if (!post) return '';
  const color = COLORS[siteSlug] || '#333';
  const rawDate = Object.values(post).find(v => typeof v === 'string' && /^\d{4}-\d{2}-\d{2}(T|$)/.test(v))
    || post.published_at;
  const dateStr = new Date(rawDate).toLocaleDateString('th-TH', { day:'numeric', month:'long' });
  const category = post.category || DEFAULT_LABELS[siteSlug] || 'วันดีดี';
  const fullUrl = `https://goody-bay.vercel.app/?site=${siteSlug}&full=1`;
  return `
    <div class="card">
      ${post.cover_image_url ? `<img class="card-img" src="${post.cover_image_url}" alt="${post.title}">` : ''}
      <div class="card-body">
        <div class="badge" style="background:${color}18;color:${color};">${category} · ${dateStr}</div>
        <div class="card-title">${post.title}</div>
        ${post.meta_description ? `<div class="card-desc">${post.meta_description}</div>` : ''}
        <a class="read-btn" href="${fullUrl}" target="_blank" style="background:${color};">อ่านบทความเต็ม</a>
      </div>
    </div>`;
}

async function load() {
  const app = document.getElementById('app');

  try {
    if (isFull) {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/blog_posts?site_slug=eq.${encodeURIComponent(site)}&order=published_at.desc&limit=1&select=*`,
        { headers: HEADERS }
      );
      const data = await res.json();
      if (!data || data.length === 0) {
        app.innerHTML = '<div class="empty">ยังไม่มีบทความในวันนี้</div>';
        return;
      }
      const post = data[0];
      document.title = post.title;
      app.innerHTML = `
        <div class="full-wrap">
          <a class="back-btn" href="?site=${site}" target="_top">← กลับ</a>
          ${post.content_html || ''}
        </div>`;
      return;
    }

    const [mainPost, healthPost] = await Promise.all([
      fetchLatestPost(site),
      site === 'health' ? Promise.resolve(null) : fetchLatestPost('health'),
    ]);

    if (!mainPost && !healthPost) {
      app.innerHTML = '<div class="empty">ยังไม่มีบทความในวันนี้</div>';
      return;
    }

    app.innerHTML = renderCard(mainPost, site) + renderCard(healthPost, 'health');
  } catch(e) {
    app.innerHTML = `<div class="empty">เกิดข้อผิดพลาด: ${e.message}</div>`;
  }
  postHeight();
  document.querySelectorAll('img').forEach(img => img.addEventListener('load', postHeight));
}

function postHeight() {
  if (window.parent === window) return;
  const h = Math.ceil(document.documentElement.scrollHeight);
  window.parent.postMessage({ source: 'goody', height: h }, '*');
}
window.addEventListener('resize', postHeight);

load();
</script>
</body>
</html>
